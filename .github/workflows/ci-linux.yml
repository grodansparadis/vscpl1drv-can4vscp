name: Linux CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  build-and-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build rpm

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Install to staging
        run: cmake --install build --prefix "$PWD/stage"

      - name: Create DEB package
        run: cpack --config build/CPackConfig.cmake -G DEB -B "$PWD/dist"

      - name: Create RPM package
        run: cpack --config build/CPackConfig.cmake -G RPM -B "$PWD/dist"

      - name: Create TGZ package
        run: cpack --config build/CPackConfig.cmake -G TGZ -B "$PWD/dist"

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: dist/*
